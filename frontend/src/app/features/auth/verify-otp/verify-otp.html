<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>
  <p class="text-xs text-slate-400">
    We've sent a one-time code to
    <span class="font-medium text-slate-200">{{ email }}</span
    >.
  </p>

  <div class="space-y-1.5">
    <label class="block text-xs font-medium text-slate-300" for="otp"> Verification code </label>
    <input
      id="otp"
      type="text"
      formControlName="otp"
      maxlength="6"
      minlength="6"
      class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-50 tracking-[0.4em] text-center placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/70 focus:border-transparent"
      placeholder="000000"
    />
    <div>
      @if (form.get('otp')?.touched && (form.get('otp')?.invalid || form.get('otp')?.errors)) {
        <p class="mt-1 text-xs text-red-400">
          @if (form.get('otp')?.errors?.['required']) {
            OTP is required.
          }
          @if (form.get('otp')?.errors?.['minlength']) {
            OTP must be 6 characters.
          }
        </p>
      }
    </div>
  </div>

  <button
    type="submit"
    class="inline-flex w-full items-center justify-center rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-lg shadow-blue-600/40 hover:bg-blue-500 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
    [disabled]="form.invalid || authState().loading"
  >
    @if (!authState().loading) {
      <span>Verify</span>
    }
    @if (!authState().loading) {
      <span>Verify</span>
    }
    @if (authState().loading) {
      <span class="flex items-center gap-2">
        <span
          class="h-4 w-4 animate-spin rounded-full border-2 border-slate-200 border-t-transparent"
        ></span>
        Verifying...
      </span>
    }
  </button>
</form>
