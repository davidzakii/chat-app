<div class="flex-1 flex overflow-hidden">
  <app-sidebar
    [class.w-72]="!sidebarService.isCollapsed()"
    [class.w-16]="sidebarService.isCollapsed()"
    class="flex transition-all duration-300 ease-in-out border-r border-slate-800 overflow-hidden"
  ></app-sidebar>

  <div class="flex-1 flex flex-col">
    @if (selectedUserId()) {
      <app-chat-window class="flex-1 mb-25 min-h-screen"></app-chat-window>
      <app-message-input
        [style.left]="sidebarService.isCollapsed() ? '5rem' : '18rem'"
        [style.width]="sidebarService.isCollapsed() ? 'calc(100% - 5rem)' : 'calc(100% - 18rem)'"
        class="border-t border-slate-800 fixed bottom-0 bg-slate-900/80 backdrop-blur transition-all duration-300 ease-in-out"
      ></app-message-input>
    } @else {
      <div class="flex-1 flex flex-col items-center justify-center gap-3">
        <p class="text-sm text-slate-400">
          Select a conversation from the sidebar to start chatting.
        </p>
      </div>
    }
  </div>
</div>
