<div class="flex-1 flex overflow-hidden">
  <app-sidebar
    class="flex w-72 border-r border-slate-800"
  ></app-sidebar>

  <div class="flex-1 flex flex-col">
    @if (selectedUserId()) {
      <app-chat-window class="flex-1 mb-12 h-1vh"></app-chat-window>
      <app-message-input
        class="border-t border-slate-800 fixed left-72 right-0 bottom-0 w-[calc(100%-18rem)] bg-slate-900/80 backdrop-blur"
      ></app-message-input>
    } @else {
      <div class="flex-1 flex flex-col items-center justify-center gap-3">
        <p class="text-sm text-slate-400">
          Select a conversation from the sidebar to start chatting.
        </p>
      </div>
    }
  </div>
</div>
