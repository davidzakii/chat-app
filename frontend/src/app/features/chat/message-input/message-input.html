<form
  class="flex flex-col gap-2 px-3 py-2 bg-slate-950/90 backdrop-blur border-t border-slate-800"
  (ngSubmit)="onSend()"
>
  @if (filePreviews.length > 0) {
    <div
      class="flex flex-wrap gap-2 p-2 bg-slate-900/50 rounded-xl border border-slate-800 animate-in fade-in slide-in-from-bottom-2"
    >
      @for (preview of filePreviews; track $index) {
        <div class="relative group h-14 w-14 mx-3">
          @if (preview.isImage) {
            <img
              [src]="preview.url"
              class="h-full w-full object-cover rounded-lg border border-slate-700 shadow-sm"
            />
          } @else {
            <div
              class="h-full w-full flex items-center justify-center bg-slate-800 rounded-lg border border-slate-700 p-1"
            >
              <span class="text-[8px] text-slate-400 text-center break-all">{{
                preview.name | slice: 0 : 12
              }}</span>
            </div>
          }
          <button
            type="button"
            (click)="removeFile($index)"
            class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] hover:bg-red-600 transition-colors shadow-xl"
          >
            &times;
          </button>
        </div>
      }
    </div>
  }

  <div class="flex items-end gap-2">
    <label
      class="flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-xl border border-slate-800 bg-slate-900 text-slate-300 hover:bg-slate-800 cursor-pointer transition-colors"
    >
      <input #fileInput type="file" class="hidden" multiple (change)="onFilesSelected($event)" />
      <span class="text-lg leading-none">+</span>
    </label>

    <textarea
      [(ngModel)]="text"
      name="message"
      rows="1"
      class="flex-1 max-h-32 rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-xs text-slate-50 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/70 resize-none"
      placeholder="Type a message..."
    ></textarea>

    <button
      type="submit"
      class="inline-flex h-9 w-9 flex-shrink-0 items-center justify-center rounded-xl bg-blue-600 text-white text-sm font-medium shadow-lg shadow-blue-600/40 hover:bg-blue-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      [disabled]="!canSend"
    >
      ➤
    </button>
  </div>
</form>
