<div class="min-h-screen flex flex-col bg-slate-950 text-slate-50">
  <header
    class="h-14 border-b border-slate-800 flex items-center justify-between px-4 md:px-6 bg-slate-900/80 backdrop-blur fixed z-10 w-full"
  >
    <div class="flex items-center gap-2">
      <div
        class="h-8 w-8 rounded-lg bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-xs font-bold"
      >
        eC
      </div>
      <span class="font-semibold text-sm md:text-base">eChat</span>
    </div>

    <div class="flex items-center gap-3">
      @if (user()) {
        <button
          class="flex items-center gap-2 text-xs md:text-sm text-slate-200 hover:text-white transition-colors"
          [routerLink]="['/profile']"
        >
          <span
            class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-slate-800 text-[11px] uppercase"
          >
            {{ userInitials() }}
          </span>
          <span class="hidden sm:inline truncate max-w-[140px]">
            {{ user()!.fullName }}
          </span>
        </button>
      }

      <button
        type="button"
        (click)="onLogout()"
        class="inline-flex items-center justify-center rounded-lg border border-slate-700 bg-slate-900 px-2.5 py-1.5 text-xs font-medium text-slate-100 hover:bg-slate-800 transition-colors"
      >
        Logout
      </button>
    </div>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
