<div class="min-h-screen flex flex-col bg-slate-950 text-slate-50">
  <header
    class="h-14 border-b border-slate-800 flex items-center justify-between px-4 md:px-6 bg-slate-900/80 backdrop-blur fixed z-20 w-full"
  >
    <div class="flex items-center justify-between gap-2 w-1/2">
      <div class="flex items-center justify-between gap-2">
        <div
          class="h-8 w-8 rounded-lg bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-xs font-bold"
        >
          <button class="cursor-pointer" routerLink="chat">eC</button>
        </div>
        <button class="cursor-pointer" routerLink="chat">
          <span class="font-semibold text-sm md:text-base">eChat</span>
        </button>
      </div>
      <button
        (click)="changeSideBarDirection()"
        type="button"
        class="relative inline-grid size-7 place-items-center rounded-md text-white-950 hover:bg-white-950/5 dark:hover:bg-white/10 cursor-pointer"
        aria-label="Open navigation menu"
      >
        <span class="absolute top-1/2 left-1/2 size-11 -translate-1/2 pointer-fine:hidden"></span>
        @if (!isSideBarLeft) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            xmlns:serif="http://www.serif.com/"
            fill="#ffffff"
            width="50px"
            height="30px"
            viewBox="0 0 64 64"
            version="1.1"
            xml:space="preserve"
            style="
              fill-rule: evenodd;
              clip-rule: evenodd;
              stroke-linejoin: round;
              stroke-miterlimit: 2;
            "
          >
            <rect id="Icons" x="-320" y="-128" width="1280" height="800" style="fill: none" />

            <g id="Icons1" serif:id="Icons">
              <g id="Strike"></g>

              <g id="H1"></g>

              <g id="H2"></g>

              <g id="H3"></g>

              <g id="list-ul"></g>

              <g id="hamburger-1"></g>

              <g id="hamburger-2"></g>

              <g id="list-ol"></g>

              <g id="list-task"></g>

              <g id="trash"></g>

              <g id="vertical-menu"></g>

              <g id="horizontal-menu"></g>

              <g id="sidebar-2"></g>

              <g id="Pen"></g>

              <g id="Pen1" serif:id="Pen"></g>

              <g id="clock"></g>

              <g id="external-link"></g>

              <g id="hr"></g>

              <g id="info"></g>

              <g id="warning"></g>

              <g id="plus-circle"></g>

              <g id="minus-circle"></g>

              <path
                id="caret-right"
                d="M45.01,32.025l-24.071,-24.071l-3.008,3.009l21.061,21.062l-21.061,21.062l3.008,3.008l24.071,-24.07Z"
                style="fill-rule: nonzero"
              />

              <g id="vue"></g>

              <g id="cog"></g>

              <g id="logo"></g>

              <g id="radio-check"></g>

              <g id="eye-slash"></g>

              <g id="eye"></g>

              <g id="toggle-off"></g>

              <g id="shredder"></g>

              <g id="spinner--loading--dots-" serif:id="spinner [loading, dots]"></g>

              <g id="react"></g>

              <g id="check-selected"></g>

              <g id="turn-off"></g>

              <g id="code-block"></g>

              <g id="user"></g>

              <g id="coffee-bean"></g>

              <g id="coffee-beans">
                <g id="coffee-bean1" serif:id="coffee-bean"></g>
              </g>

              <g id="coffee-bean-filled"></g>

              <g id="coffee-beans-filled">
                <g id="coffee-bean2" serif:id="coffee-bean"></g>
              </g>

              <g id="clipboard"></g>

              <g id="clipboard-paste"></g>

              <g id="clipboard-copy"></g>

              <g id="Layer1"></g>
            </g>
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
            xmlns:serif="http://www.serif.com/"
            fill="#ffffff"
            width="50px"
            height="30px"
            viewBox="0 0 64 64"
            version="1.1"
            xml:space="preserve"
            style="
              fill-rule: evenodd;
              clip-rule: evenodd;
              stroke-linejoin: round;
              stroke-miterlimit: 2;
            "
          >
            <rect id="Icons" x="-384" y="-128" width="1280" height="800" style="fill: none" />

            <g id="Icons1" serif:id="Icons">
              <g id="Strike"></g>

              <g id="H1"></g>

              <g id="H2"></g>

              <g id="H3"></g>

              <g id="list-ul"></g>

              <g id="hamburger-1"></g>

              <g id="hamburger-2"></g>

              <g id="list-ol"></g>

              <g id="list-task"></g>

              <g id="trash"></g>

              <g id="vertical-menu"></g>

              <g id="horizontal-menu"></g>

              <g id="sidebar-2"></g>

              <g id="Pen"></g>

              <g id="Pen1" serif:id="Pen"></g>

              <g id="clock"></g>

              <g id="external-link"></g>

              <g id="hr"></g>

              <g id="info"></g>

              <g id="warning"></g>

              <g id="plus-circle"></g>

              <g id="minus-circle"></g>

              <path
                id="caret-left"
                d="M18.543,32.027l24.07,-24.07l3.009,3.008l-21.062,21.062l21.062,21.062l-3.009,3.009l-24.07,-24.071Z"
                style="fill-rule: nonzero"
              />

              <g id="vue"></g>

              <g id="cog"></g>

              <g id="logo"></g>

              <g id="radio-check"></g>

              <g id="eye-slash"></g>

              <g id="eye"></g>

              <g id="toggle-off"></g>

              <g id="shredder"></g>

              <g id="spinner--loading--dots-" serif:id="spinner [loading, dots]"></g>

              <g id="react"></g>

              <g id="check-selected"></g>

              <g id="turn-off"></g>

              <g id="code-block"></g>

              <g id="user"></g>

              <g id="coffee-bean"></g>

              <g id="coffee-beans">
                <g id="coffee-bean1" serif:id="coffee-bean"></g>
              </g>

              <g id="coffee-bean-filled"></g>

              <g id="coffee-beans-filled">
                <g id="coffee-bean2" serif:id="coffee-bean"></g>
              </g>

              <g id="clipboard"></g>

              <g id="clipboard-paste"></g>

              <g id="clipboard-copy"></g>

              <g id="Layer1"></g>
            </g>
          </svg>
        }
      </button>
      <div class="px-4 border-b border-slate-800/80 w-1/2">
        <div class="flex items-center gap-3">
          <div
            class="h-9 w-9 rounded-full bg-slate-800 flex items-center justify-center text-[11px] font-medium uppercase text-slate-200"
          >
            <button class="cursor-pointer" routerLink="chat">{{ otherInitials() }}</button>
          </div>
          <div>
            <p class="text-sm font-medium text-slate-100">
              <button class="cursor-pointer" routerLink="chat">{{ selectedUserName() }}</button>
            </p>
            <p
              class="text-[11px]"
              [class]="
                messagesState().onlineUsers.includes(messagesState().selectedUserId!)
                  ? 'text-emerald-400/80'
                  : 'text-slate-400/80'
              "
            >
              <button class="cursor-pointer" routerLink="chat">
                {{
                  messagesState().onlineUsers.includes(messagesState().selectedUserId!)
                    ? 'Online'
                    : 'Offline'
                }}
              </button>
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      @if (user()) {
        <button
          type="button"
          class="flex items-center gap-2 text-xs md:text-sm text-slate-200 hover:text-white transition-colors cursor-pointer"
          routerLink="profile"
        >
          <span
            class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-slate-800 text-[11px] uppercase"
          >
            {{ userInitials() }}
          </span>
          <span class="hidden sm:inline truncate max-w-[140px]">
            {{ user()!.fullName }}
          </span>
        </button>
      }

      <button
        type="button"
        (click)="onLogout()"
        class="inline-flex items-center justify-center rounded-lg border border-slate-700 bg-slate-900 px-2.5 py-1.5 text-xs font-medium text-slate-100 hover:bg-slate-800 transition-colors cursor-pointer"
      >
        Logout
      </button>
    </div>
  </header>

  <main>
    <router-outlet></router-outlet>
  </main>
</div>
